<!DOCTYPE html>
<html>
<head>
  <title>Halaman Top Up Game</title>
  <style>
    /* Gaya tampilan halaman */
    body {
      font-family: Arial, sans-serif;
    }
    
    h1 {
      color: #333;
    }
    
    .game-list {
      list-style-type: none;
      padding: 0;
    }
    
    .game-item {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .game-logo {
      width: 50px;
      height: 50px;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <h1>Halaman Top Up Game</h1>
  
  <h2>Daftar Game:</h2>
  <ul class="game-list">
    <li class="game-item">
      <img src="game1-logo.png" alt="Logo Game 1" class="game-logo">
      <div>
        <h3>Game 1</h3>
        <p>Deskripsi singkat tentang Game 1.</p>
        <p><a href="topup/game1">Top Up Game 1</a></p>
      </div>
    </li>
    
    <li class="game-item">
      <img src="game2-logo.png" alt="Logo Game 2" class="game-logo">
      <div>
        <h3>Game 2</h3>
        <p>Deskripsi singkat tentang Game 2.</p>
        <p><a href="topup/game2">Top Up Game 2</a></p>
      </div>
    </li>
    
    <!-- Tambahkan daftar game lainnya sesuai kebutuhan -->
  </ul>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Halaman Top Up Game - Form Add List</title>
  <style>
    /* Gaya tampilan halaman */
    body {
      font-family: Arial, sans-serif;
    }
    
    h1 {
      color: #333;
    }
    
    form {
      margin-top: 20px;
    }
    
    form label {
      display: block;
      margin-bottom: 10px;
    }
    
    form input[type="text"],
    form textarea {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
    }
    
    form input[type="submit"] {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Halaman Top Up Game</h1>
  
  <h2>Tambahkan Game Baru:</h2>
  <form action="proses_add_list.php" method="POST">
    <label for="game-name">Nama Game:</label>
    <input type="text" id="game-name" name="game-name" required>
    
    <label for="game-description">Deskripsi Game:</label>
    <textarea id="game-description" name="game-description" rows="4" required></textarea>
    
    <input type="submit" value="Tambahkan">
  </form>
</body>
</html>
